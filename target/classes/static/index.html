<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener 🔗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
    }

    .navbar {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .navbar h1 { font-size: 1.5rem; font-weight: 700; }
    .navbar span { font-size: 1.6rem; }

    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      backdrop-filter: blur(8px);
    }

    .card h2 { font-size: 1.2rem; margin-bottom: 20px; color: #a78bfa; }

    label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #c4b5fd; }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1rem;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #a78bfa; }

    .btn {
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-danger { background: #dc2626; color: #fff; padding: 6px 14px; font-size: 0.8rem; border-radius: 6px; border: none; cursor: pointer; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; padding: 6px 14px; font-size: 0.8rem; border-radius: 6px; border: none; cursor: pointer; }

    .result-box {
      background: rgba(124, 58, 237, 0.2);
      border: 1px solid #7c3aed;
      border-radius: 12px;
      padding: 20px;
      margin-top: 16px;
      display: none;
    }

    .result-box .short-url {
      font-size: 1.3rem;
      font-weight: 700;
      color: #c4b5fd;
      word-break: break-all;
    }

    .copy-btn {
      margin-top: 10px;
      background: #7c3aed;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .copy-btn:hover { background: #6d28d9; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      color: #a78bfa;
      font-weight: 600;
    }

    td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      color: #e2e8f0;
    }

    tr:hover td { background: rgba(255,255,255,0.03); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-green { background: #166534; color: #86efac; }
    .badge-red { background: #7f1d1d; color: #fca5a5; }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #7c3aed;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 0.95rem;
      display: none;
      z-index: 9999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .short-link { color: #a78bfa; text-decoration: none; }
    .short-link:hover { text-decoration: underline; }

    .error-msg { color: #f87171; font-size: 0.9rem; margin-top: 8px; display: none; }

    .row { display: flex; gap: 16px; }
    .row > div { flex: 1; }

    @media (max-width: 600px) {
      .row { flex-direction: column; }
      table { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <span>🔗</span>
  <h1>URL Shortener</h1>
</div>

<div class="container">

  <!-- Shorten Form -->
  <div class="card">
    <h2>✂️ Shorten a URL</h2>

    <label>Long URL *</label>
    <input type="text" id="originalUrl" placeholder="https://example.com/very/long/url/here" />

    <div class="row">
      <div>
        <label>Custom Alias (optional)</label>
        <input type="text" id="customAlias" placeholder="e.g. my-blog" />
      </div>
      <div>
        <label>Expires After (hours, 0 = never)</label>
        <input type="number" id="expiryHours" placeholder="0" min="0" value="0" />
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <button class="btn btn-primary" onclick="shortenUrl()">⚡ Shorten URL</button>

    <div class="result-box" id="resultBox">
      <p style="color:#94a3b8; margin-bottom:8px;">Your short URL:</p>
      <div class="short-url" id="shortUrlDisplay"></div>
      <button class="copy-btn" onclick="copyUrl()">📋 Copy</button>
    </div>
  </div>

  <!-- URL List -->
  <div class="card">
    <h2>📋 All Shortened URLs</h2>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Original URL</th>
            <th>Short URL</th>
            <th>Alias</th>
            <th>Clicks</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="urlTableBody">
          <tr><td colspan="7" style="text-align:center;color:#64748b;padding:30px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API = '/api/urls';

  async function shortenUrl() {
    const originalUrl = document.getElementById('originalUrl').value.trim();
    const customAlias = document.getElementById('customAlias').value.trim();
    const expiryHours = parseInt(document.getElementById('expiryHours').value) || 0;
    const errEl = document.getElementById('errorMsg');
    const resultBox = document.getElementById('resultBox');

    errEl.style.display = 'none';
    resultBox.style.display = 'none';

    if (!originalUrl) {
      showError('Please enter a URL!');
      return;
    }

    if (!originalUrl.startsWith('http://') && !originalUrl.startsWith('https://')) {
      showError('URL must start with http:// or https://');
      return;
    }

    try {
      const body = { originalUrl, expiryHours };
      if (customAlias) body.customAlias = customAlias;

      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (!data.success) {
        showError(data.message || 'Something went wrong!');
        return;
      }

      document.getElementById('shortUrlDisplay').textContent = data.data.shortUrl;
      resultBox.style.display = 'block';
      showToast('✅ URL shortened successfully!');
      loadUrls();

      // Clear fields
      document.getElementById('originalUrl').value = '';
      document.getElementById('customAlias').value = '';
      document.getElementById('expiryHours').value = '0';

    } catch (e) {
      showError('Network error: ' + e.message);
    }
  }

  async function loadUrls() {
    const tbody = document.getElementById('urlTableBody');
    try {
      const res = await fetch(API);
      const data = await res.json();
      const urls = data.data;

      if (!urls || urls.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#64748b;padding:30px;">No URLs yet. Shorten your first one! 👆</td></tr>';
        return;
      }

      tbody.innerHTML = urls.reverse().map((url, i) => `
        <tr>
          <td>${i + 1}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${url.originalUrl}">
            <a href="${url.originalUrl}" target="_blank" class="short-link">${url.originalUrl}</a>
          </td>
          <td>
            <a href="${url.shortUrl}" target="_blank" class="short-link">${url.shortUrl}</a>
          </td>
          <td>${url.customAlias || '—'}</td>
          <td>🖱️ ${url.clickCount}</td>
          <td>
            <span class="badge ${url.active ? 'badge-green' : 'badge-red'}">
              ${url.active ? 'Active' : 'Inactive'}
            </span>
          </td>
          <td style="display:flex;gap:6px;">
            <button class="btn-secondary" onclick="copyToClipboard('${url.shortUrl}')">📋</button>
            ${url.active ? `<button class="btn-secondary" onclick="deactivate(${url.id})">🚫</button>` : ''}
            <button class="btn-danger" onclick="deleteUrl(${url.id})">🗑️</button>
          </td>
        </tr>
      `).join('');

    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="7" style="color:#f87171;text-align:center;">Error loading URLs</td></tr>`;
    }
  }

  async function deleteUrl(id) {
    if (!confirm('Delete this URL?')) return;
    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
    const data = await res.json();
    showToast(data.success ? '🗑️ Deleted!' : data.message);
    loadUrls();
  }

  async function deactivate(id) {
    const res = await fetch(`${API}/${id}/deactivate`, { method: 'PATCH' });
    const data = await res.json();
    showToast(data.success ? '🚫 Deactivated!' : data.message);
    loadUrls();
  }

  function copyUrl() {
    const url = document.getElementById('shortUrlDisplay').textContent;
    copyToClipboard(url);
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 Copied to clipboard!'));
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }

  // Load on page start
  loadUrls();
</script>
</body>
</html>
